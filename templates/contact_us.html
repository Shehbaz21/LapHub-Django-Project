<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us | LapHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    min-height:100vh;
    color:#fff;
}

/* ===== Hero ===== */
.hero{
    text-align:center;
    padding:60px 20px 30px;
}

.hero h1{
    font-size:42px;
    font-weight:700;
    letter-spacing:1px;
}

.hero p{
    opacity:.85;
    margin-top:10px;
}

/* ===== Container ===== */
.container{
    width:90%;
    max-width:1200px;
    margin:30px auto 60px;
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(320px,1fr));
    gap:35px;
}

/* ===== Glass Card ===== */
.glass{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(14px);
    border-radius:20px;
    padding:35px;
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 20px 40px rgba(0,0,0,0.35);
}

/* ===== Info ===== */
.info h2{
    margin-bottom:20px;
    font-weight:600;
}

.info-item{
    margin-bottom:18px;
    line-height:1.6;
    opacity:.9;
}

/* ===== Form ===== */
.form-box h2{
    margin-bottom:25px;
}

.form-group{
    position:relative;
    margin-bottom:22px;
}

.form-group input,
.form-group textarea{
    width:100%;
    padding:14px 14px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.25);
    background:transparent;
    color:#fff;
    font-size:14px;
    outline:none;
}

.form-group label{
    position:absolute;
    left:14px;
    top:14px;
    font-size:13px;
    opacity:.7;
    transition:.25s;
    pointer-events:none;
    background:transparent;
}

/* Floating effect */
.form-group input:focus + label,
.form-group input:valid + label,
.form-group textarea:focus + label,
.form-group textarea:valid + label{
    top:-8px;
    font-size:11px;
    opacity:1;
    background:#203a43;
    padding:0 6px;
    border-radius:4px;
}

/* ===== Button ===== */
.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:#fff;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,114,255,.5);
}

/* ===== Footer ===== */
footer{
    text-align:center;
    padding:25px;
    background:rgba(0,0,0,.35);
    backdrop-filter:blur(10px);
    font-size:14px;
}

/* ===== Responsive ===== */
@media(max-width:500px){
    .hero h1{
        font-size:32px;
    }
}
</style>
</head>
<body>

<div class="hero">
    <h1>Contact LapHub</h1>
    <p>We’d love to hear from you — reach out anytime.</p>
</div>

<div class="container">

    <!-- Info -->
    <div class="glass info">
        <h2>Get in Touch</h2>

        <div class="info-item"><strong>📍 Address:</strong><br>
            Vaghodia, Gujarat, India
        </div>

        <div class="info-item"><strong>📞 Phone:</strong><br>
            +91 98765 43210
        </div>

        <div class="info-item"><strong>📧 Email:</strong><br>
            support@laphub.com
        </div>

        <div class="info-item"><strong>🕒 Hours:</strong><br>
            Mon – Sat (10 AM – 7 PM)
        </div>
    </div>

    <!-- Form -->
    <div class="glass form-box">
        <h2>Send Message</h2>

        <form>
            <div class="form-group">
                <input type="text" required>
                <label>Your Name</label>
            </div>

            <div class="form-group">
                <input type="email" required>
                <label>Your Email</label>
            </div>

            <div class="form-group">
                <input type="text" required>
                <label>Subject</label>
            </div>

            <div class="form-group">
                <textarea rows="4" required></textarea>
                <label>Your Message</label>
            </div>

            <button class="btn">Send Message</button>
        </form>
    </div>

</div>

<footer>
    © 2026 LapHub • Premium Laptop Store
</footer>

</body>
</html>
